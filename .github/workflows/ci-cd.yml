name: FluxBridge Auto CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# Needed for GHCR pushes and GitHub Releases
permissions:
  contents: write
  packages: write
  pull-requests: write
  id-token: write

jobs:
  verify-backend:
    name: Backend CI (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'
      - name: Install dependencies
        run: npm ci || npm install
      - name: Check Syntax / Mock Test
        run: |
          node --check src/index.js
          npm run lint --if-present
          npm test --if-present

  verify-frontend:
    name: Frontend CI (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      - name: Install dependencies
        run: npm ci || npm install
      - name: Build & Lint Frontend
        run: |
          npm run lint --if-present
          npm run build

  build-plugin:
    name: Build Plugin (Maven/Java)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./plugin
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Compile Java Plugin (.jar)
        run: mvn clean package --file pom.xml
      - name: Upload Plugin Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FluxBridge-DevBuild
          path: ./plugin/target/FluxBridge-1.0-SNAPSHOT.jar
          if-no-files-found: error

  # ------------------------------------------------------------------------
  # Semantic Release & Docker Automation (Runs only on Push to Main)
  # ------------------------------------------------------------------------
  release-please:
    name: Semantic Release
    needs: [verify-backend, verify-frontend, build-plugin]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: simple
          
  upload-release-assets:
    name: Upload Plugin & Docker Images
    needs: [release-please]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # 1. Rebuild and Attach the Plugin JAR to the auto-generated Release
      - name: Download Built Plugin Artifact
        uses: actions/download-artifact@v4
        with:
          name: FluxBridge-DevBuild
          path: ./artifact-bin
          
      - name: Upload Plugin to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: ./artifact-bin/FluxBridge-1.0-SNAPSHOT.jar
          
      # 2. Build & Push Docker Images to GHCR
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build and push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository }}/fluxbridge-backend:latest,ghcr.io/${{ github.repository }}/fluxbridge-backend:${{ needs.release-please.outputs.tag_name }}
          
      - name: Build and push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ github.repository }}/fluxbridge-frontend:latest,ghcr.io/${{ github.repository }}/fluxbridge-frontend:${{ needs.release-please.outputs.tag_name }}
