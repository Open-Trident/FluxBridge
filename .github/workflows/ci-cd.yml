name: FluxBridge Auto CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# Needed for GHCR pushes and GitHub Releases
permissions:
  contents: write
  packages: write
  pull-requests: write
  id-token: write

jobs:
  verify-backend:
    name: Backend CI (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./examples/backend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './examples/backend/package-lock.json'
      - name: Install dependencies
        run: npm ci || npm install
      - name: Check Syntax / Mock Test
        run: |
          node --check src/index.js
          npm run lint --if-present
          npm test --if-present

  verify-frontend:
    name: Frontend CI (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./examples/frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './examples/frontend/package-lock.json'
      - name: Install dependencies
        run: npm ci || npm install
      - name: Build & Lint Frontend
        run: |
          npm run lint --if-present
          npm run build

  build-plugin:
    name: Build Plugin (Maven/Java)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./plugin
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Compile Java Plugin (.jar)
        run: mvn clean package --file pom.xml
      - name: Upload Plugin Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FluxBridge-DevBuild
          path: ./plugin/target/FluxBridge-*.jar
          if-no-files-found: error

  release:
    name: Auto Release Plugin
    needs: [verify-backend, verify-frontend, build-plugin]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Built Plugin Artifact
        uses: actions/download-artifact@v4
        with:
          name: FluxBridge-DevBuild
          path: ./artifact-bin
          
      - name: Auto-Generate Release Notes
        id: generate_changelog
        run: |
          # Generate a short hash payload for unique releasing without tags
          SHORT_SHA=$(git rev-parse --short HEAD)
          RELEASE_TAG="v1.1.0-$SHORT_SHA"
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
          
          # Rename the artifact to match the release tag dynamically
          JAR_FILE=$(find ./artifact-bin -name "FluxBridge-*.jar" | head -n 1)
          mv "$JAR_FILE" "./artifact-bin/FluxBridge-$RELEASE_TAG.jar"
          echo "jar_path=./artifact-bin/FluxBridge-$RELEASE_TAG.jar" >> $GITHUB_OUTPUT
          
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "## 🚀 FluxBridge Stable Release (Build $SHORT_SHA)" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Verification Pipeline" >> $GITHUB_OUTPUT
          echo "✅ **Java Build**: Compiled natively targeting Paper API JDK 17" >> $GITHUB_OUTPUT
          echo "✅ **Node.js**: Backend syntactic check complete" >> $GITHUB_OUTPUT
          echo "✅ **React**: Dashboard production bundle compiled successfully" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Instructions" >> $GITHUB_OUTPUT
          echo "- **Plugin Installation**: Drop the \`FluxBridge-$RELEASE_TAG.jar\` file below into your \`plugins/\` folder and configure via the dashboard." >> $GITHUB_OUTPUT
          echo "- View the complete architectural [README.md] for setup guidance." >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.generate_changelog.outputs.release_tag }}
          name: "FluxBridge Build ${{ steps.generate_changelog.outputs.release_tag }}"
          body: ${{ steps.generate_changelog.outputs.notes }}
          files: ${{ steps.generate_changelog.outputs.jar_path }}
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
